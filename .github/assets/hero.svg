<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="50%" style="stop-color:#131824"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="amberGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D97706"/>
      <stop offset="50%" style="stop-color:#F59E0B"/>
      <stop offset="100%" style="stop-color:#D97706"/>
    </linearGradient>
    <linearGradient id="amberVert" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B"/>
      <stop offset="100%" style="stop-color:#B45309"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="bigGlow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="centerLight" cx="50%" cy="45%" r="40%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>
  <rect width="1200" height="400" fill="url(#centerLight)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.04" stroke="#F59E0B" stroke-width="0.5">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="1000" y1="0" x2="1000" y2="400"/>
  </g>

  <!-- Data stream lines radiating from center eye -->
  <g opacity="0.25" stroke="#F59E0B" stroke-width="1">
    <!-- Left streams -->
    <line x1="500" y1="155" x2="80" y2="40"/>
    <line x1="490" y1="170" x2="60" y2="120"/>
    <line x1="485" y1="185" x2="50" y2="200"/>
    <line x1="490" y1="200" x2="60" y2="280"/>
    <line x1="500" y1="215" x2="80" y2="360"/>
    <!-- Right streams -->
    <line x1="700" y1="155" x2="1120" y2="40"/>
    <line x1="710" y1="170" x2="1140" y2="120"/>
    <line x1="715" y1="185" x2="1150" y2="200"/>
    <line x1="710" y1="200" x2="1140" y2="280"/>
    <line x1="700" y1="215" x2="1120" y2="360"/>
  </g>

  <!-- Data stream dots -->
  <g fill="#F59E0B">
    <circle cx="290" cy="97" r="2" opacity="0.4"/>
    <circle cx="180" cy="147" r="1.5" opacity="0.3"/>
    <circle cx="270" cy="192" r="2" opacity="0.35"/>
    <circle cx="200" cy="260" r="1.5" opacity="0.3"/>
    <circle cx="310" cy="300" r="2" opacity="0.4"/>
    <circle cx="910" cy="97" r="2" opacity="0.4"/>
    <circle cx="1020" cy="147" r="1.5" opacity="0.3"/>
    <circle cx="930" cy="192" r="2" opacity="0.35"/>
    <circle cx="1000" cy="260" r="1.5" opacity="0.3"/>
    <circle cx="890" cy="300" r="2" opacity="0.4"/>
  </g>

  <!-- Outer glow ring around eye -->
  <ellipse cx="600" cy="185" rx="80" ry="50" fill="none" stroke="#F59E0B" stroke-width="1" opacity="0.15" filter="url(#bigGlow)"/>

  <!-- Eye shape (vision symbol) -->
  <ellipse cx="600" cy="185" rx="55" ry="34" fill="none" stroke="url(#amberGlow)" stroke-width="2.5" filter="url(#glow)"/>

  <!-- Pupil -->
  <circle cx="600" cy="185" r="16" fill="url(#amberVert)" filter="url(#glow)"/>
  <circle cx="600" cy="185" r="7" fill="#0d1117"/>
  <circle cx="596" cy="181" r="3" fill="#F59E0B" opacity="0.5"/>

  <!-- DarshanDB text -->
  <text x="600" y="275" text-anchor="middle" font-family="'SF Pro Display', 'Inter', system-ui, -apple-system, sans-serif" font-size="52" font-weight="800" fill="white" letter-spacing="4" filter="url(#softGlow)">DarshJDB</text>

  <!-- Amber underline -->
  <rect x="470" y="286" width="260" height="2" rx="1" fill="url(#amberGlow)" opacity="0.6"/>

  <!-- Tagline -->
  <text x="600" y="318" text-anchor="middle" font-family="'SF Pro Display', 'Inter', system-ui, -apple-system, sans-serif" font-size="16" font-weight="400" fill="#9CA3AF" letter-spacing="3">SELF-HOSTED BaaS &middot; ONE BINARY &middot; YOUR DATA</text>

  <!-- Tech badges at bottom -->
  <g font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#6B7280" letter-spacing="1">
    <text x="370" y="365" text-anchor="middle">RUST</text>
    <text x="490" y="365" text-anchor="middle">POSTGRESQL</text>
    <text x="600" y="365" text-anchor="middle">WEBSOCKET</text>
    <text x="720" y="365" text-anchor="middle">TYPESCRIPT</text>
    <text x="840" y="365" text-anchor="middle">MSGPACK</text>
  </g>

  <!-- Separator dots between tech -->
  <g fill="#F59E0B" opacity="0.4">
    <circle cx="430" cy="362" r="2"/>
    <circle cx="545" cy="362" r="2"/>
    <circle cx="660" cy="362" r="2"/>
    <circle cx="780" cy="362" r="2"/>
  </g>

  <!-- Corner accents -->
  <path d="M0 0 L40 0 L0 40 Z" fill="#F59E0B" opacity="0.06"/>
  <path d="M1200 0 L1160 0 L1200 40 Z" fill="#F59E0B" opacity="0.06"/>
  <path d="M0 400 L40 400 L0 360 Z" fill="#F59E0B" opacity="0.06"/>
  <path d="M1200 400 L1160 400 L1200 360 Z" fill="#F59E0B" opacity="0.06"/>

  <!-- Top and bottom border lines -->
  <rect x="0" y="0" width="1200" height="1" fill="#F59E0B" opacity="0.15"/>
  <rect x="0" y="399" width="1200" height="1" fill="#F59E0B" opacity="0.15"/>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f17"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Subtle grid dots -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="0.5" fill="#ffffff" opacity="0.05"/>
  </pattern>
  <rect width="1200" height="400" fill="url(#dots)"/>

  <!-- Left side text -->
  <text x="80" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="#ffffff" letter-spacing="-2">DarshJDB</text>
  <text x="84" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#9ca3af" font-weight="400">Self-hosted Backend-as-a-Service</text>
  <text x="84" y="232" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#d4a843" font-weight="500">Built in Rust. Runs on a $5 VPS.</text>

  <!-- Accent line under tagline -->
  <rect x="84" y="244" width="60" height="2" fill="#d4a843" rx="1"/>

  <!-- Right side: architectural diagram -->
  <!-- Connection lines (behind nodes) -->
  <g stroke="#4b5563" stroke-width="1.5" fill="none">
    <line x1="850" y1="200" x2="750" y2="110"/>
    <line x1="850" y1="200" x2="950" y2="110"/>
    <line x1="850" y1="200" x2="990" y2="200"/>
    <line x1="850" y1="200" x2="950" y2="290"/>
    <line x1="850" y1="200" x2="750" y2="290"/>
    <line x1="850" y1="200" x2="710" y2="200"/>
    <!-- Outer ring connections -->
    <line x1="750" y1="110" x2="710" y2="200" opacity="0.4"/>
    <line x1="950" y1="110" x2="990" y2="200" opacity="0.4"/>
    <line x1="990" y1="200" x2="950" y2="290" opacity="0.4"/>
    <line x1="750" y1="290" x2="710" y2="200" opacity="0.4"/>
    <line x1="750" y1="110" x2="950" y2="110" opacity="0.3"/>
    <line x1="950" y1="290" x2="750" y2="290" opacity="0.3"/>
  </g>

  <!-- Subtle glow behind central node -->
  <circle cx="850" cy="200" r="90" fill="#d4a843" opacity="0.015"/>
  <circle cx="850" cy="200" r="60" fill="#d4a843" opacity="0.03"/>

  <!-- Central DDB node -->
  <circle cx="850" cy="200" r="32" fill="none" stroke="#d4a843" stroke-width="2"/>
  <circle cx="850" cy="200" r="28" fill="#0f0f17"/>
  <text x="850" y="206" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#d4a843" text-anchor="middle">DDB</text>

  <!-- Auth node -->
  <circle cx="750" cy="110" r="24" fill="#0f0f17" stroke="#4b5563" stroke-width="1.5"/>
  <text x="750" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle" font-weight="500">Auth</text>

  <!-- Query node -->
  <circle cx="950" cy="110" r="24" fill="#0f0f17" stroke="#4b5563" stroke-width="1.5"/>
  <text x="950" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle" font-weight="500">Query</text>

  <!-- Sync node -->
  <circle cx="990" cy="200" r="24" fill="#0f0f17" stroke="#4b5563" stroke-width="1.5"/>
  <text x="990" y="205" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle" font-weight="500">Sync</text>

  <!-- Storage node -->
  <circle cx="950" cy="290" r="24" fill="#0f0f17" stroke="#4b5563" stroke-width="1.5"/>
  <text x="950" y="295" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle" font-weight="500">Storage</text>

  <!-- Views node -->
  <circle cx="750" cy="290" r="24" fill="#0f0f17" stroke="#4b5563" stroke-width="1.5"/>
  <text x="750" y="295" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle" font-weight="500">Views</text>

  <!-- Fields node -->
  <circle cx="710" cy="200" r="24" fill="#0f0f17" stroke="#4b5563" stroke-width="1.5"/>
  <text x="710" y="205" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle" font-weight="500">Fields</text>

  <!-- Bottom-right: Rust crab (geometric/minimal) -->
  <g transform="translate(1100, 340)" opacity="0.6">
    <!-- Crab body -->
    <ellipse cx="0" cy="0" rx="18" ry="12" fill="none" stroke="#d4a843" stroke-width="1.5"/>
    <!-- Eyes -->
    <circle cx="-6" cy="-4" r="2" fill="#d4a843"/>
    <circle cx="6" cy="-4" r="2" fill="#d4a843"/>
    <!-- Claws (left) -->
    <line x1="-18" y1="-2" x2="-28" y2="-10" stroke="#d4a843" stroke-width="1.5"/>
    <line x1="-28" y1="-10" x2="-24" y2="-16" stroke="#d4a843" stroke-width="1.5"/>
    <line x1="-28" y1="-10" x2="-34" y2="-14" stroke="#d4a843" stroke-width="1.5"/>
    <!-- Claws (right) -->
    <line x1="18" y1="-2" x2="28" y2="-10" stroke="#d4a843" stroke-width="1.5"/>
    <line x1="28" y1="-10" x2="24" y2="-16" stroke="#d4a843" stroke-width="1.5"/>
    <line x1="28" y1="-10" x2="34" y2="-14" stroke="#d4a843" stroke-width="1.5"/>
    <!-- Legs (left) -->
    <line x1="-14" y1="8" x2="-22" y2="16" stroke="#d4a843" stroke-width="1"/>
    <line x1="-10" y1="10" x2="-16" y2="18" stroke="#d4a843" stroke-width="1"/>
    <!-- Legs (right) -->
    <line x1="14" y1="8" x2="22" y2="16" stroke="#d4a843" stroke-width="1"/>
    <line x1="10" y1="10" x2="16" y2="18" stroke="#d4a843" stroke-width="1"/>
  </g>

  <!-- Top and bottom border -->
  <rect x="0" y="0" width="1200" height="1" fill="#d4a843" opacity="0.1"/>
  <rect x="0" y="399" width="1200" height="1" fill="#d4a843" opacity="0.1"/>
</svg>
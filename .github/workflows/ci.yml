name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  rust:
    name: Rust (fmt + clippy + test)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: darshan
          POSTGRES_PASSWORD: darshan
          POSTGRES_DB: darshandb_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy lints
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Run tests
        run: cargo test --workspace
        env:
          DATABASE_URL: postgres://darshan:darshan@localhost:5432/darshandb_test

  typescript:
    name: TypeScript (typecheck + lint + test + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build (generates types for cross-package refs)
        run: npm run build --workspaces --if-present
      - name: Lint
        run: npm run lint --workspaces --if-present
      - name: Test
        run: npm test --workspaces --if-present

  php:
    name: PHP (test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/php
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer
      - run: composer install --no-interaction --prefer-dist
      - run: vendor/bin/phpunit || echo "No tests configured yet"

  python:
    name: Python (test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest --no-header -q 2>/dev/null || echo "No tests configured yet"

  docker:
    name: Docker build (smoke test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: darshandb:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

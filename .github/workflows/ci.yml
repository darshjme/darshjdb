name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  rust:
    name: Rust (fmt + clippy + test)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: darshan
          POSTGRES_PASSWORD: darshan
          POSTGRES_DB: darshandb_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy lints
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Run tests
        run: cargo test --workspace
        env:
          DATABASE_URL: postgres://darshan:darshan@localhost:5432/darshandb_test

      - name: Smoke test (build server binary and verify it starts)
        run: |
          cargo build --release --bin darshandb-server
          # Verify the binary exists and is executable
          test -x ./target/release/darshandb-server
          echo "Binary built successfully at ./target/release/darshandb-server"

          # Start the server and verify it responds to /health
          DATABASE_URL=postgres://darshan:darshan@localhost:5432/darshandb_test \
          DARSHAN_PORT=7799 \
          DARSHAN_DEV=1 \
          DARSHAN_JWT_SECRET=ci-smoke-test-secret \
          RUST_LOG=error \
            ./target/release/darshandb-server &
          SMOKE_PID=$!

          # Wait up to 30s for health check
          for i in $(seq 1 30); do
            if curl -sf http://localhost:7799/health >/dev/null 2>&1; then
              echo "Server responded to /health after ${i}s"
              kill "$SMOKE_PID" 2>/dev/null || true
              wait "$SMOKE_PID" 2>/dev/null || true
              echo "Smoke test passed"
              exit 0
            fi
            if ! kill -0 "$SMOKE_PID" 2>/dev/null; then
              echo "::error::Server exited before responding to /health"
              exit 1
            fi
            sleep 1
          done
          kill "$SMOKE_PID" 2>/dev/null || true
          echo "::error::Server did not respond to /health within 30s"
          exit 1

  typescript:
    name: TypeScript (typecheck + lint + test + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build (generates types for cross-package refs)
        run: npm run build --workspaces --if-present
      - name: Lint
        run: npm run lint --workspaces --if-present
      - name: Test
        run: npm test --workspaces --if-present

  php:
    name: PHP (test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/php
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer
      - run: composer install --no-interaction --prefer-dist
      - run: vendor/bin/phpunit || echo "No tests configured yet"

  python:
    name: Python (test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest --no-header -q 2>/dev/null || echo "No tests configured yet"

  docker:
    name: Docker build (smoke test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: darshandb:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

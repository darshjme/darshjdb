name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: ddb-linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: ddb-linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: ddb-macos-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: ddb-macos-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: ddb-windows-amd64.exe
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
      - name: Build
        run: cargo build --release --workspace --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.target == 'aarch64-unknown-linux-gnu' && 'aarch64-linux-gnu-gcc' || '' }}
      - name: Package binaries
        shell: bash
        run: |
          mkdir -p staging
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp target/${{ matrix.target }}/release/ddb-server.exe staging/ 2>/dev/null || true
            cp target/${{ matrix.target }}/release/ddb.exe staging/ 2>/dev/null || true
          else
            cp target/${{ matrix.target }}/release/ddb-server staging/ 2>/dev/null || true
            cp target/${{ matrix.target }}/release/ddb staging/ 2>/dev/null || true
            strip staging/* 2>/dev/null || true
          fi
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: staging/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ddb-linux-amd64/*
            ddb-linux-arm64/*
            ddb-macos-amd64/*
            ddb-macos-arm64/*
            ddb-windows-amd64.exe/*

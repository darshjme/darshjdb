# DarshJDB — created by Darshankumar Joshi (github.com/darshjme)
# ddb-cache: tiered cache primitives for the DarshJDB engine.
# L1 DashMap (slice 8) + L2 Postgres persistent tier (slice 9) +
# DdbUnifiedCache (slice 10) + slice 11 DdbCache engine backing the
# RESP3 protocol server and the HTTP REST cache API.
[package]
name = "ddb-cache"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
homepage.workspace = true
repository.workspace = true
keywords.workspace = true
categories.workspace = true
description = "DarshJDB cache crate — L1 DashMap + L2 Postgres + DdbCache engine (hash/list/zset/stream/bloom/HLL). Created by Darshankumar Joshi."
publish = true

[lib]
name = "ddb_cache"
path = "src/lib.rs"

[dependencies]
tokio = { workspace = true }
sqlx = { workspace = true }
dashmap = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
chrono = { workspace = true }
tracing = { workspace = true }
thiserror = { workspace = true }
async-trait = { workspace = true }
bytes = { workspace = true }
tokio-util = { workspace = true }
zstd = { workspace = true }
lz4_flex = { workspace = true }
probabilistic-collections = { workspace = true }
uuid = { workspace = true }
metrics = { workspace = true }

[dev-dependencies]
sqlx = { workspace = true, features = ["runtime-tokio", "postgres", "uuid", "json", "chrono", "macros", "migrate"] }
tokio = { workspace = true }

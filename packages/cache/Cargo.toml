# DarshJDB — created by Darshankumar Joshi (github.com/darshjme)
# ddb-cache: L1 + DdbCache primitives backing the RESP3 protocol server
# and the HTTP REST cache API. Introduced in Slices 8-11.
[package]
name = "ddb-cache"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "DarshJDB cache crate — DashMap L1, DdbCache with hash/list/zset/stream/bloom/HLL"
authors = ["Darshankumar Joshi <github.com/darshjme>"]

[lib]
name = "ddb_cache"
path = "src/lib.rs"

[dependencies]
tokio = { workspace = true }
dashmap = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
bytes = { workspace = true }
tokio-util = { workspace = true }
zstd = { workspace = true }
lz4_flex = { workspace = true }
probabilistic-collections = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
tracing = { workspace = true }
metrics = { workspace = true }
